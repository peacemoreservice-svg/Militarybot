# Pella Deployment Configuration
app:
  name: militarybot
  runtime: node
  version: "18"

services:
  web:
    command: npm start
    port: 3000
    scale:
      min: 1
      max: 1

environment:
  PHONE_NUMBER: ${PHONE_NUMBER}
  NODE_ENV: production

auth:
  type: phone_number
  phone_number: ${PHONE_NUMBER}

build:
  - npm install
